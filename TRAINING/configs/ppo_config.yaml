algorithm:
  name: "PPO"
  learning_rate: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  batch_size: 64
  epochs: 4

training:
  episodes: 10000
  eval_interval: 100
  save_interval: 500
  max_steps_per_episode: 10
  seed: 42

model:
  backbone: "gpt2"
  hidden_size: 256
  num_layers: 4
  num_heads: 4
  dropout: 0.1

logging:
  use_wandb: false
  project: "customer-service-bot"
  log_interval: 10
